services:
  - type: web
    name: student-portal
    runtime: node
    plan: free # no persistent disk needed — the database lives in Turso, not on local disk
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true # Render generates and stores a strong random secret
      - key: TURSO_DATABASE_URL
        sync: false # set manually in the Render dashboard — see app.turso.tech
      - key: TURSO_AUTH_TOKEN
        sync: false # set manually in the Render dashboard (sensitive — never commit it)
